version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dbname
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api-gateway:
    build:
      context: ./services/api-gateway
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

  web:
    build:
      context: ./apps/antigravity-web
    ports:
      - "3000:3000"
    env_file:
      - .env
